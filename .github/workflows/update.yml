name: Update parser

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  regenerate:
    uses: tree-sitter/workflows/.github/workflows/regenerate.yml@main
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    with:
      # tree-sitter@0.25.0 fails to build its Node binding under Node 24.
      node-version: "22"
